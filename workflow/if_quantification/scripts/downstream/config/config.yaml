# Path to helper functions
helper:
    py: "config/helpers.py"
    R: "config/helpers.R"

# Path to conda env
conda_env: "../../../../senv"

# Squidpy layer to be used for input and output
sq_layer: 'image_adaptive'
out_layer: 'cleaned_mask'

# Channels to be analyzed
channels:
    dapi: 0
    tdp43: 2
    map2: 3

# Label connectivity
connectivity: 2

# Nuclear segmentation parameters
nuc:
    border_clear: false
    fill_holes: true
    save_intermediates: true
    # Debris-control parameter
    # (treat the smallest tail of objects as the best estimate of likely noise/speckle scale.)
    min_component_quantile: 0.10
    # small-hole filling parameter
    # (The 25th percentile is more permissive than the 10th percentile,
    # which makes sense because internal holes can be somewhat larger than isolated specks)
    area_threshold_quantile: 0.25
    # merged-object/artifact flagging parameter
    # (isolates the extreme upper tail rather than the center of the size distribution,
    # which is where you’d expect merged nuclei or image artifacts to appear)
    large_object_quantile: 0.99
    # Safety cap
    # (Without it, one or two giant bizarre objects could push the “large object” 
    # threshold so high that genuinely suspicious large nuclei would no longer be flagged.)
    max_reasonable_area_multiplier: 4.0
    watershed_for_splitting: true
    dt_smoothing_sigma: 1.0
    # how close two peaks can be before they are treated as one
    # (A larger footprint reduces over-splitting; a smaller one increases sensitivity
    # to local bumps and may split one nucleus into multiple labels.)
    peak_footprint: 9
    # readability and speed of QC visualization
    qc_overlay_max_objects: 500

# Cytoplasmic segmentation parameters
cyt:
    # Debris-control parameter
    min_component_quantile: 0.10
    # Small-hole filling parameter
    area_threshold_quantile: 0.25
    # Upper-tail cutoff to flag excessively large MAP2 objects
    large_object_quantile: 0.95
    # Safety cap for large-object threshold
    max_reasonable_area_multiplier: 5
    # Readability and speed of QC visualization
    qc_overlay_max_objects: 300
    # Additional TRUE/FALSE options
    fill_holes: true
    border_clear: false

target:
    # Lower quantile of connected-component area used to estimate the minimum object size.
    # Components below this empirical size cutoff are treated as likely debris/noise.
    min_component_quantile: 0.05
    # Quantile used to derive the hole-removal / area cleanup threshold from the component-size distribution.
    # Larger values make cleanup more conservative by tolerating bigger gaps/small artifacts before removal.
    area_threshold_quantile: 0.25
    # Upper quantile used to identify unusually large connected components in the target mask.
    # Useful for flagging merged objects or broad artifacts relative to the image-specific size distribution.
    large_object_quantile: 0.99
    # Caps the largest "reasonable" object area as a multiple of the reference large-object estimate.
    # Objects beyond this multiplier can be treated as likely artifacts or pathological merges.
    max_reasonable_area_multiplier: 5
    # If true, run morphology-based cleanup using the thresholds estimated above.
    # If false, preserve the incoming target mask as-is.
    apply_cleanup: true
    # If true, fill internal holes within target objects during cleanup.
    # False preserves internal voids, which is often safer for already-binarized masks 
    # when occupancy shape matters.
    fill_holes: false
    # If true, remove objects touching the image border.
    # False keeps partial edge objects, which may be desirable if border truncation
    # should not exclude valid signal.
    border_clear: false

integration:
    # Minimum number of overlapping pixels required for direct assignment between objects.
    # A value of 1 means any nonzero overlap is sufficient to establish a match.
    assignment_overlap_min_pixels: 1
    # Maximum fallback distance (in pixels) allowed when overlap-based assignment fails.
    # A value of 0 disables distance-based reassignment and enforces overlap-only matching.
    assignment_max_distance: 10
