# ------------------------------------------------------------------
# Shared helper files
# Aim:
# - keep Python and R helper code centralized
# ------------------------------------------------------------------
helper:
    py: "config/helpers.py"
    R: "config/helpers.R"

# Path to conda env
conda_env: "../../../../senv"

# Squidpy layer to be used for input and output
sq_layer: 'image_adaptive'
out_layer: 'cleaned_mask'

# Channels to be analyzed
channels:
    dapi: 0
    tdp43: 2
    map2: 3

# Label connectivity
connectivity: 2

# ------------------------------------------------------------------
# Sample-level metadata
# Aim:
# - attach image/sample identity to outputs
# - allow future scale-aware behavior when pixel metadata are known
# Notes:
# - leave pixel_size_um / magnification as null if unavailable
# - a future batch wrapper can populate these per sample
# ------------------------------------------------------------------
sample:
    sample_id: "demo_sample"
    image_id: "demo_image"
    group: "demo"
    pixel_size_um: null
    magnification: null

# ------------------------------------------------------------------
# Nuclear segmentation parameters
# Aim:
# - retain image-adaptive cleanup
# - add guardrails for unusual images
# - support scale-aware watershed splitting
# ------------------------------------------------------------------
nuc:
    border_clear: false
    fill_holes: true
    save_intermediates: true

    # Debris-control parameter
    # Treat the smallest tail of objects as the best estimate of likely
    # noise / speckle scale in the current image.
    min_component_quantile: 0.10

    # Small-hole filling parameter
    # The 25th percentile is usually more permissive than the 10th percentile,
    # which is useful because interior holes may be somewhat larger than isolated specks.
    area_threshold_quantile: 0.25

    # Upper-tail object-size parameter
    # Used to identify unusually large connected components that may represent
    # merged nuclei or artifacts.
    large_object_quantile: 0.99

    # Safety cap so one bizarre giant object does not make the large-object cutoff unusably high.
    max_reasonable_area_multiplier: 4.0

    # --------------------------------------------------------------
    # Guardrails for adaptive cleanup
    # Aim:
    # - keep thresholds from becoming unstable on sparse or artifact-heavy images
    # - these are still in pixel units for now
    # --------------------------------------------------------------
    min_plausible_nucleus_area_px: 16
    max_plausible_nucleus_area_px: 50000

    min_min_size_px: 4
    max_min_size_px: 5000

    min_hole_area_px: 4
    max_hole_area_px: 10000

    watershed_for_splitting: true

    # --------------------------------------------------------------
    # Watershed settings
    # Aim:
    # - if auto_compute is true, estimate sigma and footprint from the
    #   image-derived nucleus size distribution
    # - if false, use the manual fallback values below
    # --------------------------------------------------------------
    watershed:
        auto_compute: true

        # Manual fallback values
        dt_smoothing_sigma: 1.0

        # A larger footprint reduces over-splitting;
        # a smaller one increases sensitivity to local bumps.
        peak_footprint: 9

        # Auto-estimation rules
        sigma_as_fraction_of_radius: 0.20
        peak_footprint_as_fraction_of_diameter: 0.50

        # Safety bounds for auto-estimation
        min_dt_smoothing_sigma: 0.8
        max_dt_smoothing_sigma: 3.0

        min_peak_footprint: 5
        max_peak_footprint: 21

    # Readability and speed of QC visualization
    qc_overlay_max_objects: 500

# Cytoplasmic segmentation parameters
cyt:
    # Debris-control parameter
    min_component_quantile: 0.10
    # Small-hole filling parameter
    area_threshold_quantile: 0.25
    # Upper-tail cutoff to flag excessively large MAP2 objects
    large_object_quantile: 0.95
    # Safety cap for large-object threshold
    max_reasonable_area_multiplier: 5
    # Readability and speed of QC visualization
    qc_overlay_max_objects: 300
    # Additional TRUE/FALSE options
    fill_holes: true
    border_clear: false

target:
    # Lower quantile of connected-component area used to estimate the minimum object size.
    # Components below this empirical size cutoff are treated as likely debris/noise.
    min_component_quantile: 0.05
    # Quantile used to derive the hole-removal / area cleanup threshold from the component-size distribution.
    # Larger values make cleanup more conservative by tolerating bigger gaps/small artifacts before removal.
    area_threshold_quantile: 0.25
    # Upper quantile used to identify unusually large connected components in the target mask.
    # Useful for flagging merged objects or broad artifacts relative to the image-specific size distribution.
    large_object_quantile: 0.99
    # Caps the largest "reasonable" object area as a multiple of the reference large-object estimate.
    # Objects beyond this multiplier can be treated as likely artifacts or pathological merges.
    max_reasonable_area_multiplier: 5
    # If true, run morphology-based cleanup using the thresholds estimated above.
    # If false, preserve the incoming target mask as-is.
    apply_cleanup: true
    # If true, fill internal holes within target objects during cleanup.
    # False preserves internal voids, which is often safer for already-binarized masks 
    # when occupancy shape matters.
    fill_holes: false
    # If true, remove objects touching the image border.
    # False keeps partial edge objects, which may be desirable if border truncation
    # should not exclude valid signal.
    border_clear: false

integration:
    # Minimum number of overlapping pixels required for direct assignment between objects.
    # A value of 1 means any nonzero overlap is sufficient to establish a match.
    assignment_overlap_min_pixels: 1
    # Maximum fallback distance (in pixels) allowed when overlap-based assignment fails.
    # A value of 0 disables distance-based reassignment and enforces overlap-only matching.
    assignment_max_distance: 10

tissue:
    # Enable shared tissue-footprint masking before downstream QC and quantification.
    # This removes obvious out-of-sample objects across all masks.
    enabled: true

    # Channels used to build the initial tissue-support mask. "nuc_plus_cyt" or "all_channels"
    # "nuc_plus_cyt" is the safer default because it does not let target-channel noise define tissue.
    source: "nuc_plus_cyt"

    # ----------- Customize the following values and uncomment, if necessary -----------------
    # Minimum connected-component size kept in the tissue mask.
    # Increase this to remove more small debris; decrease it if valid tissue fragments are being lost.
    # min_size: 1000

    # Maximum hole size filled inside the tissue-support mask.
    # Larger values make the tissue footprint more continuous.
    # hole_area: 20000

    # Radius used for binary closing to bridge small gaps in the tissue mask.
    # Larger values connect nearby regions more aggressively.
    # closing_radius: 9

    # Radius used to slightly expand the cleaned tissue mask.
    # This helps avoid trimming valid signal near tissue edges.
    # dilation_radius: 12

    # Rule for deciding which cleaned tissue components to keep.
    # "largest_n" is stricter; "min_area" is more permissive for fragmented tissue.
    # component_policy: "min_area"

    # Number of largest components to keep when using "largest_n".
    # This is ignored when component_policy is "min_area".
    # keep_n_largest: 1

    # Minimum area required for a tissue component to be retained.
    # Lower this if real tissue pieces are being removed.
    # min_component_area: 20000

    # Optional rescue radius around the original nuclear mask.
    # This helps preserve valid nucleus-supported regions that a strict tissue mask might trim away.
    # nuclear_rescue_radius: 5
